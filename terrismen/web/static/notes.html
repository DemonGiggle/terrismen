<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terrismen Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=asset-organic-20260510">
</head>
<body class="organic-theme">
  <div class="shell notes-shell">
    <header class="topbar">
      <div class="topbar-copy">
        <a class="eyebrow" href="/">← Workspace</a>
        <h1 id="notes-title">Notes</h1>
        <p class="subtitle" id="notes-subtitle">Notes and unresolved questions.</p>
      </div>
      <div class="topbar-actions">
        <a class="button-link secondary" href="/settings">Settings</a>
      </div>
    </header>

    <main>
      <section class="panel notes-viewer" aria-labelledby="notes-title">
        <div class="split-header notes-controls">
          <label>
            Show
            <select id="note-type-filter">
              <option value="normal">Notes</option>
              <option value="mystery">Unresolved questions</option>
            </select>
          </label>
          <span id="notes-count" class="tag">Loading…</span>
        </div>

        <div id="notes-list" class="notes-list" aria-live="polite"></div>

        <nav class="pager" aria-label="Notes pagination">
          <button id="notes-prev" class="secondary" type="button">Previous</button>
          <span id="notes-page-label" class="meta">Page 1</span>
          <button id="notes-next" class="secondary" type="button">Next</button>
        </nav>
      </section>
    </main>
  </div>
  <script type="module" src="/static/notes.js?v=asset-organic-20260510"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terrismen Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=asset-notes-hover-20260513">
</head>
<body class="monochrome-theme">
  <a class="skip-link" href="#notes-viewer">Skip to content</a>
  <div class="shell notes-shell">
    <header class="topbar">
      <div class="topbar-copy">
        <a class="eyebrow" href="/">← Workspace</a>
        <h1 id="notes-title">Notes</h1>
        <p class="subtitle" id="notes-subtitle">Notes, malformed notes, and unresolved questions.</p>
      </div>
      <div class="topbar-actions">
        <a class="button-link secondary" href="/settings">Settings</a>
      </div>
    </header>

    <main>
      <section id="notes-viewer" class="panel notes-viewer" aria-labelledby="notes-title">
        <div class="split-header notes-controls">
          <label>
            Show
            <select id="note-type-filter">
              <option value="normal">Notes</option>
              <option value="malformed">Malformed notes</option>
              <option value="mystery">Unresolved questions</option>
            </select>
          </label>
          <span id="notes-count" class="tag">Loading…</span>
        </div>

        <div id="notes-list" class="notes-list" aria-live="polite"></div>

        <nav class="pager" aria-label="Notes pagination">
          <button id="notes-prev" class="secondary" type="button" aria-label="Previous page of notes">Previous</button>
          <span id="notes-page-label" class="meta">Page 1</span>
          <button id="notes-next" class="secondary" type="button" aria-label="Next page of notes">Next</button>
        </nav>
      </section>
    </main>
  </div>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
      },
      svg: { fontCache: "global" },
      options: { skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"] },
      startup: {
        ready() {
          window.MathJax.startup.defaultReady();
          window.dispatchEvent(new Event("terrismen:math-ready"));
        },
      },
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script type="module" src="/static/notes.js?v=asset-math-render-20260511"></script>
</body>
</html>
